apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: myapp-staging
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/AbdiqadirAbdikrin/multi-env-Gitops
    targetRevision: main
    path: myapp

    helm:
      valueFiles:
        - ../env/staging-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true